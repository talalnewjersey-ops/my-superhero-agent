<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Super Hero Agent</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'DM Sans', sans-serif;
    background:#ffffff;
    color:#111;
}

.container {
    max-width:1000px;
    margin:auto;
    padding:10px;
}

.tabs {
    display:flex;
    justify-content:space-around;
    border-bottom:1px solid #eee;
}

.tab {
    padding:10px;
    cursor:pointer;
}

.active {
    font-weight:bold;
    border-bottom:2px solid #000;
}

.section {
    display:none;
    padding:10px;
}

.section.active {
    display:block;
}

.chat-box {
    height:60vh;
    overflow-y:auto;
    border:1px solid #eee;
    padding:10px;
    margin-bottom:10px;
}

.input-area {
    display:flex;
}

input, textarea {
    flex:1;
    padding:10px;
    border:1px solid #ddd;
}

button {
    padding:10px;
    border:none;
    background:#000;
    color:#fff;
    cursor:pointer;
}

.card {
    border:1px solid #eee;
    padding:15px;
    margin:10px 0;
    cursor:pointer;
}

.status {
    margin-top:10px;
    font-weight:bold;
}

@media(max-width:600px){
    .chat-box{height:50vh;}
}
</style>
</head>

<body>

<div class="container">

<h2>🦸 My Super Hero Agent</h2>

<div class="tabs">
    <div class="tab active" onclick="switchTab(0)">💬 Chat</div>
    <div class="tab" onclick="switchTab(1)">🔌 Outils</div>
    <div class="tab" onclick="switchTab(2)">⚙️ Config</div>
    <div class="tab" onclick="switchTab(3)">📋 Historique</div>
</div>

<!-- CHAT -->
<div class="section active">
    <div class="chat-box" id="chatBox"></div>

    <div>
        <select id="mode">
            <option>Chat</option>
            <option>GitHub</option>
            <option>API</option>
            <option>Workflow</option>
            <option>Debug</option>
            <option>WordPress</option>
        </select>
    </div>

    <div class="input-area">
        <input id="userInput" placeholder="Pose ta question..." />
        <button onclick="sendMessage()">Envoyer</button>
    </div>

    <div style="margin-top:10px;">
        <button onclick="quick('GitHub automation')">GitHub</button>
        <button onclick="quick('Fix WordPress SEO')">Fix WordPress</button>
        <button onclick="quick('TikTok automation')">TikTok Auto</button>
        <button onclick="quick('Build API')">API Builder</button>
        <button onclick="quick('CI/CD deploy')">CI/CD</button>
        <button onclick="quick('Free APIs list')">APIs gratuites</button>
    </div>
</div>

<!-- OUTILS -->
<div class="section">
    <div class="card" onclick="quick('GitHub automation')">GitHub</div>
    <div class="card" onclick="quick('WordPress optimization')">WordPress</div>
    <div class="card" onclick="quick('TikTok automation')">TikTok</div>
    <div class="card" onclick="quick('Gmail API automation')">Gmail</div>
    <div class="card" onclick="quick('Make.com workflows')">Make.com</div>
    <div class="card" onclick="quick('Stripe automation')">Stripe</div>
    <div class="card" onclick="quick('Instagram growth')">Instagram</div>
    <div class="card" onclick="quick('Zapier automation')">Zapier</div>
</div>

<!-- CONFIG -->
<div class="section">
    <input id="apiKey" placeholder="sk-proj-..." />
    <button onclick="saveKey()">Connecter GPT-4o</button>
    <div class="status" id="status">Inactif</div>
</div>

<!-- HISTORIQUE -->
<div class="section">
    <div id="history"></div>
</div>

</div>

<script>

let chatBox = document.getElementById("chatBox");
let historyDiv = document.getElementById("history");

function switchTab(index){
    let tabs = document.querySelectorAll(".tab");
    let sections = document.querySelectorAll(".section");

    tabs.forEach(t=>t.classList.remove("active"));
    sections.forEach(s=>s.classList.remove("active"));

    tabs[index].classList.add("active");
    sections[index].classList.add("active");
}

function saveKey(){
    let key = document.getElementById("apiKey").value;
    localStorage.setItem("openai_key", key);
    document.getElementById("status").innerText = "Actif";
}

function addMessage(text, role){
    let div = document.createElement("div");
    div.innerHTML = "<b>"+role+":</b> "+text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

    saveHistory(text, role);
}

function saveHistory(text, role){
    let h = JSON.parse(localStorage.getItem("history")||"[]");
    h.push({text, role});
    localStorage.setItem("history", JSON.stringify(h));
    renderHistory();
}

function renderHistory(){
    let h = JSON.parse(localStorage.getItem("history")||"[]");
    historyDiv.innerHTML = "";
    h.forEach(item=>{
        let div = document.createElement("div");
        div.className="card";
        div.innerText = item.role+": "+item.text;
        div.onclick = ()=> quick(item.text);
        historyDiv.appendChild(div);
    });
}

function quick(text){
    document.getElementById("userInput").value = text;
}

function sendMessage(){
    let input = document.getElementById("userInput").value;
    let key = localStorage.getItem("openai_key");

    addMessage(input, "USER");

    if(!key){
        offlineResponse(input);
        return;
    }

    let xhr = new XMLHttpRequest();
    xhr.open("POST","https://api.openai.com/v1/chat/completions",true);

    xhr.setRequestHeader("Content-Type","application/json");
    xhr.setRequestHeader("Authorization","Bearer "+key);

    xhr.timeout = 30000;

    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4){
            if(xhr.status === 200){
                let res = JSON.parse(xhr.responseText);
                let msg = res.choices[0].message.content;
                addMessage(msg, "AGENT");
            } else {
                addMessage("Erreur API ou timeout", "SYSTEM");
            }
        }
    };

    xhr.onerror = function(){
        addMessage("Erreur réseau", "SYSTEM");
    };

    xhr.ontimeout = function(){
        addMessage("Timeout 30s dépassé", "SYSTEM");
    };

    let systemPrompt = "Tu es My Super Hero Agent. Parle toujours français. Expert en GitHub (talalnewjersey-ops), WordPress (moneyabroadguide.com), APIs REST, Make.com, TikTok API, Gmail API, Stripe, GitHub Actions CI/CD, OpenAI API. Donne du code complet. Mentionne les outils avec [OUTIL: nom].";

    xhr.send(JSON.stringify({
        model:"gpt-4o",
        messages:[
            {role:"system",content:systemPrompt},
            {role:"user",content:input}
        ]
    }));
}

function offlineResponse(input){
    let response = "Mode hors ligne actif.\n\n";

    if(input.toLowerCase().includes("github")){
        response += "[OUTIL: GitHub] → Automatisation CI/CD recommandée.";
    } else if(input.toLowerCase().includes("wordpress")){
        response += "[OUTIL: WordPress] → Optimisation SEO + plugins.";
    } else if(input.toLowerCase().includes("tiktok")){
        response += "[OUTIL: TikTok] → Automation contenu + viral hooks.";
    } else {
        response += "Ajoute une clé API pour réponses avancées.";
    }

    addMessage(response, "AGENT");
}

renderHistory();

</script>

</body>
</html>
