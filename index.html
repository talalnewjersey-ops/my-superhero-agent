<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Super Hero Agent SaaS</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'DM Sans';background:#fff;color:#111}
.container{max-width:1000px;margin:auto;padding:15px}

.hidden{display:none}

.card{border:1px solid #eee;border-radius:12px;padding:20px;margin-bottom:10px}

input{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin:5px 0;font-family:'DM Mono'}

button{padding:12px;border:none;background:#111;color:#fff;border-radius:10px;cursor:pointer}

.tabs{display:flex;gap:10px;margin:10px 0}
.tab{padding:10px;border-radius:8px;cursor:pointer}
.tab.active{background:#111;color:#fff}

.chat-box{height:50vh;overflow:auto;border:1px solid #eee;border-radius:10px;padding:10px;margin-bottom:10px}

.msg{margin-bottom:8px}

.quick button{margin:5px}

@media(max-width:600px){
.chat-box{height:45vh}
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="auth">

<h2>🦸 My Super Hero Agent</h2>

<div class="card">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

</div>

<!-- APP -->
<div id="app" class="hidden">

<h2>Dashboard</h2>

<div class="tabs">
<div class="tab active" onclick="tab(0)">Chat</div>
<div class="tab" onclick="tab(1)">Tools</div>
<div class="tab" onclick="tab(2)">Config</div>
<div class="tab" onclick="tab(3)">History</div>
</div>

<!-- CHAT -->
<div class="section">

<div class="chat-box" id="chat"></div>

<select id="mode">
<option>Chat</option>
<option>GitHub</option>
<option>API</option>
<option>Workflow</option>
<option>Debug</option>
<option>WordPress</option>
</select>

<input id="input" placeholder="Ask anything">
<button onclick="send()">Send</button>

<div class="quick">
<button onclick="quick('GitHub automation')">GitHub</button>
<button onclick="quick('Fix WordPress SEO')">WP Fix</button>
<button onclick="quick('TikTok automation')">TikTok</button>
<button onclick="quick('Build API')">API</button>
<button onclick="quick('CI/CD deploy')">CI/CD</button>
</div>

</div>

<!-- TOOLS -->
<div class="section hidden">
<div class="card" onclick="quick('GitHub automation')">GitHub</div>
<div class="card" onclick="quick('WordPress optimization')">WordPress</div>
<div class="card" onclick="quick('TikTok automation')">TikTok</div>
<div class="card" onclick="quick('Stripe setup')">Stripe</div>
</div>

<!-- CONFIG -->
<div class="section hidden">
<input id="key" placeholder="sk-proj-...">
<button onclick="saveKey()">Connect GPT</button>
<div id="status">Inactive</div>
</div>

<!-- HISTORY -->
<div class="section hidden">
<div id="history"></div>
</div>

</div>

</div>

<script>

var systemPrompt="You are My Super Hero Agent. Always speak English. Expert in GitHub, WordPress, APIs, TikTok, Stripe, OpenAI. Give full code. Use [TOOL:].";

function signup(){
var e=document.getElementById("email").value;
var p=document.getElementById("pass").value;
localStorage.setItem("user",JSON.stringify({e:e,p:p}));
alert("Account created");
}

function login(){
var e=document.getElementById("email").value;
var p=document.getElementById("pass").value;
var u=JSON.parse(localStorage.getItem("user")||"{}");

if(e===u.e && p===u.p){
document.getElementById("auth").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}else{
alert("Wrong login");
}
}

function tab(i){
var t=document.querySelectorAll(".tab");
var s=document.querySelectorAll(".section");

t.forEach(x=>x.classList.remove("active"));
s.forEach(x=>x.classList.add("hidden"));

t[i].classList.add("active");
s[i].classList.remove("hidden");
}

function add(role,text){
var d=document.createElement("div");
d.className="msg";
d.innerHTML="<b>"+role+":</b> "+text;
document.getElementById("chat").appendChild(d);

saveHistory(role,text);
}

function quick(t){
document.getElementById("input").value=t;
}

function saveKey(){
var k=document.getElementById("key").value;
localStorage.setItem("api_key",k);
document.getElementById("status").innerText="Active";
}

function send(){
var msg=document.getElementById("input").value;
var key=localStorage.getItem("api_key");

add("USER",msg);

if(!key){offline(msg);return;}

var xhr=new XMLHttpRequest();
xhr.open("POST","https://api.openai.com/v1/chat/completions",true);

xhr.setRequestHeader("Content-Type","application/json");
xhr.setRequestHeader("Authorization","Bearer "+key);

xhr.timeout=30000;

xhr.onreadystatechange=function(){
if(xhr.readyState===4){
if(xhr.status===200){
var r=JSON.parse(xhr.responseText);
add("AGENT",r.choices[0].message.content);
}else{
add("SYSTEM","API Error");
}
}
};

xhr.onerror=function(){add("SYSTEM","Network Error");};
xhr.ontimeout=function(){add("SYSTEM","Timeout");};

xhr.send(JSON.stringify({
model:"gpt-4o",
messages:[
{role:"system",content:systemPrompt},
{role:"user",content:msg}
]
}));
}

function offline(m){
var r="Offline mode.\n";

if(m.includes("github")) r+="[TOOL: GitHub] CI/CD recommended";
else if(m.includes("wordpress")) r+="[TOOL: WordPress] SEO optimize";
else r+="Add API key";

add("AGENT",r);
}

function saveHistory(r,t){
var h=JSON.parse(localStorage.getItem("hist")||"[]");
h.push({r:r,t:t});
localStorage.setItem("hist",JSON.stringify(h));
loadHistory();
}

function loadHistory(){
var h=JSON.parse(localStorage.getItem("hist")||"[]");
var c=document.getElementById("history");
c.innerHTML="";

h.forEach(x=>{
var d=document.createElement("div");
d.className="card";
d.innerText=x.r+": "+x.t;
d.onclick=function(){quick(x.t)};
c.appendChild(d);
});
}

</script>

</body>
</html>
