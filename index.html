<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Super Hero Agent - Real Action</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=DM+Mono&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'DM Sans';background:#fff;color:#111}
.container{max-width:1000px;margin:auto;padding:15px}
.chat{height:55vh;overflow:auto;border:1px solid #eee;border-radius:12px;padding:10px;background:#fafafa}
.msg{margin:8px 0}
.user{font-weight:600}
.agent{color:#065f46}
input{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;font-family:'DM Mono'}
button{padding:12px;border:none;background:#111;color:#fff;border-radius:10px;margin-top:5px;cursor:pointer}
.status{margin:5px 0;font-size:14px;color:#6b7280}
pre{background:#111;color:#0f0;padding:10px;border-radius:10px;overflow:auto}
</style>
</head>

<body>

<div class="container">

<h2>🦸 My Super Hero Agent (Real Action Mode)</h2>

<div class="chat" id="chat"></div>

<input id="input" placeholder="Describe your problem..." />
<button onclick="runAgent()">Run Autonomous Agent</button>

<div class="status" id="status">Idle</div>

</div>

<script>

var systemPrompt = "You are My Super Hero Agent. Always speak English. You are autonomous and must solve problems by generating real executable code and commands. Always include [TOOL:].";

function add(role,text){
var d=document.createElement("div");
d.className="msg "+(role==="USER"?"user":"agent");
d.innerHTML="<b>"+role+":</b><br>"+text;
document.getElementById("chat").appendChild(d);
}

function setStatus(s){
document.getElementById("status").innerText=s;
}

function runAgent(){

var input=document.getElementById("input").value;
var key=localStorage.getItem("api_key");

add("USER",input);
setStatus("Analyzing problem...");

if(!key){
offline(input);
return;
}

// STEP 1 ANALYSIS
setTimeout(()=>setStatus("Understanding problem..."),500);

// STEP 2 DECISION
setTimeout(()=>setStatus("Choosing best tool..."),1000);

// STEP 3 EXECUTION
setTimeout(()=>execute(input),1500);

}

function execute(input){

setStatus("Generating real solution...");

var xhr=new XMLHttpRequest();
xhr.open("POST","https://api.openai.com/v1/chat/completions",true);

xhr.setRequestHeader("Content-Type","application/json");
xhr.setRequestHeader("Authorization","Bearer "+localStorage.getItem("api_key"));

xhr.timeout=30000;

xhr.onreadystatechange=function(){
if(xhr.readyState===4){
if(xhr.status===200){

var r=JSON.parse(xhr.responseText);
var content=r.choices[0].message.content;

// FORCE ACTION MODE FORMAT
var finalOutput = `
🧠 FULL AUTONOMOUS ANALYSIS

${content}

⚡ EXECUTE THIS:

<pre>
${extractCommand(content)}
</pre>
`;

add("AGENT",finalOutput);

setStatus("Ready to execute");

}else{
add("SYSTEM","API Error");
setStatus("Error");
}
}
};

xhr.onerror=function(){add("SYSTEM","Network Error");};
xhr.ontimeout=function(){add("SYSTEM","Timeout");};

xhr.send(JSON.stringify({
model:"gpt-4o",
messages:[
{role:"system",content:systemPrompt},
{role:"user",content:input}
]
}));

}

// Extract command simulation
function extractCommand(text){

if(text.includes("wp-json")){
return "curl -X POST https://your-site/wp-json/wp/v2/posts ...";
}

if(text.includes("github")){
return "git add . && git commit -m 'auto' && git push";
}

return "Execute generated solution";
}

// OFFLINE MODE
function offline(input){

var r="🧠 Offline Autonomous Mode\n\n";

if(input.includes("wordpress")){
r+="[TOOL: WordPress]\n\nCommand:\n<pre>curl -X POST /wp-json/wp/v2/posts</pre>";
}
else if(input.includes("github")){
r+="[TOOL: GitHub]\n\nCommand:\n<pre>git push origin main</pre>";
}
else{
r+="[TOOL: AI]\n\nGeneral automation strategy";
}

add("AGENT",r);
setStatus("Offline ready");
}

</script>

</body>
</html>
